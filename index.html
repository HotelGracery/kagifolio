<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#EEF4EC" />
<title>Kagimori｜密碼管理</title>

<!-- 主畫面アイコン / PWA -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Kagimori" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
  :root{
    --bg:#EEF4EC; --bg2:#E4EEE1;
    --card:#FFFFFF; --card-soft:#F7FBF6;
    --border:#DBE7D7; --border-strong:#C7DAC2;
    --green:#88AC83; --green-deep:#5E7E59; --green-text:#6B8A66;
    --pill-bg:#DEEBD9; --pill-text:#6B8A66;
    --ink:#3B423A; --ink-soft:#8A9A86;
    --danger:#C58A8A;
    --shadow:0 6px 22px rgba(94,126,89,.10);
    --shadow-sm:0 2px 8px rgba(94,126,89,.08);
    --r:20px; --r-sm:14px;
    --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","PingFang TC","Noto Sans TC","Segoe UI",system-ui,sans-serif;
    --mono:"SF Mono","Roboto Mono",ui-monospace,"Menlo",monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font); color:var(--ink);
    background:linear-gradient(170deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed; min-height:100vh;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select,textarea{font-family:inherit; font-size:16px}

  /* ---------- layout ---------- */
  .wrap{max-width:560px; margin:0 auto; padding:18px 16px 120px}
  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 4px 14px;
  }
  .brand{display:flex; align-items:baseline; gap:8px}
  .brand h1{margin:0; font-size:22px; font-weight:800; letter-spacing:.5px; color:var(--green-deep)}
  .brand span{font-size:12px; color:var(--ink-soft); font-weight:600}
  .icon-btn{
    width:42px; height:42px; border-radius:50%;
    background:var(--card); box-shadow:var(--shadow-sm);
    display:grid; place-items:center; color:var(--green-deep);
    transition:transform .12s ease, background .15s ease;
  }
  .icon-btn:active{transform:scale(.92)}

  /* ---------- search ---------- */
  .search{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--r-sm); padding:11px 14px; box-shadow:var(--shadow-sm);
    margin-bottom:14px;
  }
  .search svg{flex:0 0 auto; color:var(--green)}
  .search input{flex:1; border:none; outline:none; background:none; color:var(--ink); font-size:15px}
  .search input::placeholder{color:#B6C6B2}

  /* ---------- chips ---------- */
  .chips{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 14px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; padding:8px 15px; border-radius:999px; font-size:13px; font-weight:700;
    background:var(--card); color:var(--green-text); border:1px solid var(--border);
    transition:all .15s ease; white-space:nowrap;
  }
  .chip.active{background:var(--green); color:#fff; border-color:var(--green); box-shadow:0 4px 12px rgba(136,172,131,.32)}
  .chip .ct{opacity:.7; font-weight:600; margin-left:4px; font-size:11px}

  /* ---------- card ---------- */
  .card{
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--r); box-shadow:var(--shadow);
    padding:18px 18px 14px; margin-bottom:14px;
    animation:pop .28s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes pop{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  .card-head{display:flex; align-items:flex-start; gap:10px}
  .card-title-zone{flex:1; min-width:0}
  .title-row{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  .card-title{font-size:20px; font-weight:800; color:var(--ink); word-break:break-word}
  .badge{
    font-size:11px; font-weight:800; color:var(--pill-text);
    background:var(--pill-bg); padding:4px 10px; border-radius:999px; white-space:nowrap;
  }
  .card-sub{font-size:13px; color:var(--green-text); margin-top:3px; font-weight:600}
  .open-btn{
    flex:0 0 auto; width:42px; height:42px; border-radius:50%;
    background:var(--pill-bg); color:var(--green-deep);
    display:grid; place-items:center; transition:transform .12s ease;
  }
  .open-btn:active{transform:scale(.9)}
  .open-btn.hidden{visibility:hidden}

  .fields{
    border:1px solid var(--border); border-radius:var(--r-sm);
    margin-top:14px; overflow:hidden; background:var(--card-soft);
  }
  .field{display:flex; align-items:center; gap:10px; padding:14px 14px}
  .field + .field{border-top:1px solid var(--border)}
  .field-label{font-size:15px; color:var(--green-text); flex:0 0 auto; font-weight:600}
  .field-val{
    flex:1; text-align:right; font-family:var(--mono); font-size:12.5px; font-weight:700;
    color:var(--ink); letter-spacing:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .field-val.dots{letter-spacing:2px; font-size:14px; color:var(--ink-soft)}
  .mini-btn{
    flex:0 0 auto; width:38px; height:38px; border-radius:11px;
    background:#EAF2E8; color:var(--green-deep);
    display:grid; place-items:center; transition:all .12s ease;
  }
  .mini-btn:active{transform:scale(.88); background:var(--green); color:#fff}

  .card-foot{display:flex; justify-content:flex-end; gap:18px; padding-top:14px}
  .foot-btn{font-size:15px; font-weight:700; color:var(--green-text)}
  .foot-btn.del{color:var(--danger)}

  /* ---------- empty ---------- */
  .empty{text-align:center; padding:70px 20px; color:var(--ink-soft)}
  .empty .em{font-size:46px; margin-bottom:10px}
  .empty p{margin:4px 0; font-size:15px}
  .empty .hint{font-size:13px; color:#A9BBA5}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed; right:max(20px,calc(50% - 280px + 20px)); bottom:26px;
    width:60px; height:60px; border-radius:20px;
    background:var(--green); color:#fff; box-shadow:0 8px 24px rgba(136,172,131,.45);
    display:grid; place-items:center; font-size:30px; font-weight:300;
    transition:transform .14s ease; z-index:40;
  }
  .fab:active{transform:scale(.9)}

  /* ---------- modal ---------- */
  .scrim{
    position:fixed; inset:0; background:rgba(59,66,58,.38); backdrop-filter:blur(3px);
    display:none; align-items:flex-end; justify-content:center; z-index:60;
  }
  .scrim.show{display:flex}
  .sheet{
    background:var(--bg); width:100%; max-width:560px;
    border-radius:26px 26px 0 0; padding:22px 20px calc(22px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px rgba(0,0,0,.16); max-height:92vh; overflow-y:auto;
    animation:up .3s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes up{from{transform:translateY(40px); opacity:.6} to{transform:none; opacity:1}}
  .sheet h2{margin:2px 0 18px; font-size:19px; font-weight:800; color:var(--green-deep)}
  .form-row{margin-bottom:14px}
  .form-row label{display:block; font-size:13px; font-weight:700; color:var(--green-text); margin-bottom:7px; padding-left:2px}
  .input, .select{
    width:100%; padding:13px 14px; border:1px solid var(--border-strong); border-radius:13px;
    background:var(--card); color:var(--ink); outline:none; transition:border .15s ease;
  }
  .input:focus, .select:focus{border-color:var(--green)}
  .pw-wrap{display:flex; gap:8px}
  .pw-wrap .input{flex:1}
  .ghost{
    padding:0 14px; border-radius:13px; background:var(--pill-bg); color:var(--green-deep);
    font-size:13px; font-weight:700; white-space:nowrap;
  }
  .ghost:active{background:var(--green); color:#fff}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{
    padding:9px 14px; border-radius:999px; font-size:13px; font-weight:700;
    background:var(--card); border:1px solid var(--border); color:var(--green-text);
  }
  .seg button.on{background:var(--green); color:#fff; border-color:var(--green)}
  .sheet-actions{display:flex; gap:10px; margin-top:8px}
  .btn{flex:1; padding:15px; border-radius:15px; font-size:16px; font-weight:800; text-align:center}
  .btn.primary{background:var(--green); color:#fff; box-shadow:0 6px 18px rgba(136,172,131,.35)}
  .btn.primary:active{transform:scale(.98)}
  .btn.subtle{background:var(--card); color:var(--green-text); border:1px solid var(--border)}

  /* settings rows */
  .set-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:15px 16px; margin-bottom:11px;
  }
  .set-row .l{font-size:15px; font-weight:700; color:var(--ink)}
  .set-row .d{font-size:12px; color:var(--ink-soft); margin-top:3px; font-weight:500; max-width:320px}
  .set-go{font-size:13px; font-weight:800; color:var(--green-deep); white-space:nowrap}
  .ver{text-align:center; color:#A9BBA5; font-size:12px; margin-top:22px; line-height:1.7}

  /* ---------- toast ---------- */
  .toast{
    position:fixed; left:50%; bottom:108px; transform:translateX(-50%) translateY(20px);
    background:var(--green-deep); color:#fff; padding:11px 20px; border-radius:999px;
    font-size:14px; font-weight:700; box-shadow:0 8px 24px rgba(0,0,0,.2);
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:90; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* ---------- lock screen ---------- */
  .lock{
    position:fixed; inset:0; z-index:200; background:linear-gradient(170deg,var(--bg),var(--bg2));
    display:none; flex-direction:column; align-items:center; justify-content:center; padding:30px; text-align:center;
  }
  .lock.show{display:flex}
  .lock .key{font-size:54px; margin-bottom:14px}
  .lock h2{margin:0 0 6px; color:var(--green-deep); font-size:22px; font-weight:800}
  .lock p{margin:0 0 22px; color:var(--ink-soft); font-size:14px}
  .lock input{
    width:100%; max-width:300px; padding:15px 16px; border:1px solid var(--border-strong);
    border-radius:15px; text-align:center; background:var(--card); outline:none; font-size:18px; letter-spacing:2px;
  }
  .lock input:focus{border-color:var(--green)}
  .lock .btn{flex:0 0 auto; max-width:300px; width:100%; margin-top:14px}
  .lock .err{color:var(--danger); font-size:13px; min-height:18px; margin-top:10px; font-weight:600}
</style>
</head>
<body>

<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <h1>Kagimori</h1>
      <span>密碼管理</span>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="設定">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="searchInput" type="text" placeholder="搜尋名稱、帳號…" autocomplete="off" />
  </div>

  <div class="chips" id="chips"></div>

  <div id="vault"></div>
</div>

<button class="fab" id="addBtn" aria-label="新增">+</button>

<!-- add / edit sheet -->
<div class="scrim" id="editScrim">
  <div class="sheet">
    <h2 id="editTitle">新增帳號</h2>
    <div class="form-row">
      <label>分類</label>
      <div class="seg" id="catSeg"></div>
    </div>
    <div class="form-row">
      <label>名稱（網站／服務）</label>
      <input class="input" id="fName" placeholder="例：玉山銀行、Gmail、Amazon" />
    </div>
    <div class="form-row" id="rowUserid" style="display:none">
      <label>用戶代號</label>
      <input class="input" id="fUserid" placeholder="網路銀行登入用戶代號" autocomplete="off" />
    </div>
    <div class="form-row">
      <label>帳號 / Email</label>
      <input class="input" id="fAccount" placeholder="帳號、信箱或會員編號" autocomplete="off" />
    </div>
    <div class="form-row">
      <label>密碼</label>
      <input class="input" id="fPass" placeholder="密碼" autocomplete="off" />
    </div>
    <div class="form-row">
      <label>網址（可留空）</label>
      <input class="input" id="fUrl" placeholder="https://…" autocomplete="off" />
    </div>
    <div class="form-row">
      <label>備註（可留空）</label>
      <input class="input" id="fNote" placeholder="安全提示問題、分行、卡號末四碼…" autocomplete="off" />
    </div>
    <div class="sheet-actions">
      <button class="btn subtle" id="editCancel">取消</button>
      <button class="btn primary" id="editSave">儲存</button>
    </div>
  </div>
</div>

<!-- settings sheet -->
<div class="scrim" id="setScrim">
  <div class="sheet">
    <h2>設定</h2>

    <div class="set-row" id="lockRow">
      <div>
        <div class="l" id="lockLabel">設定主密碼鎖</div>
        <div class="d" id="lockDesc">開啟後資料會加密保存，每次開啟都要輸入主密碼才能解鎖。</div>
      </div>
      <div class="set-go" id="lockGo">開啟</div>
    </div>

    <div class="set-row" id="exportRow">
      <div>
        <div class="l">匯出備份</div>
        <div class="d">下載一份 JSON 備份，換手機或清快取前先存一份比較安心。</div>
      </div>
      <div class="set-go">匯出</div>
    </div>

    <div class="set-row" id="importRow">
      <div>
        <div class="l">匯入備份</div>
        <div class="d">從之前的 JSON 備份還原資料（會覆蓋目前的內容）。</div>
      </div>
      <div class="set-go">匯入</div>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" hidden />

    <div class="sheet-actions" style="margin-top:16px">
      <button class="btn subtle" id="setClose">關閉</button>
    </div>

    <div class="ver">Kagimori v2026.06.12.05<br>Made with ♡ by めいぷりん</div>
  </div>
</div>

<!-- lock screen -->
<div class="lock" id="lockScreen">
  <div class="key"><svg width="62" height="62" viewBox="0 0 64 64" fill="#88AC83" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="29" y="31" width="6" height="22" rx="3"/><rect x="35" y="44" width="7" height="3.6" rx="1.5"/><rect x="35" y="50" width="5" height="3.6" rx="1.5"/><path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" transform="translate(18.4,8) scale(0.85)"/></svg></div>
  <h2 id="lockHeading">輸入主密碼</h2>
  <p id="lockHint">解鎖你的 Kagi</p>
  <input id="lockInput" type="password" placeholder="主密碼" autocomplete="off" />
  <input id="lockInput2" type="password" placeholder="再輸入一次" autocomplete="off" style="margin-top:10px; display:none" />
  <button class="btn primary" id="lockBtn">解鎖</button>
  <div class="err" id="lockErr"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------------- config ---------------- */
  var CATS = [
    {id:"bank",  name:"銀行"},
    {id:"email", name:"Email"},
    {id:"web",   name:"網站"},
    {id:"shop",  name:"購物"},
    {id:"sns",   name:"社群"},
    {id:"other", name:"其他"}
  ];
  var K_MODE="passfolio.mode";   // "plain" | "enc"
  var K_DATA="passfolio.data";   // plain JSON or {salt,iv,ct}
  var subtle = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;

  /* ---------------- state ---------------- */
  var entries = [];
  var activeCat = "all";
  var search = "";
  var editingId = null;
  var formCat = "web";
  var cryptoKey = null;   // CryptoKey when unlocked in enc mode

  /* ---------------- helpers ---------------- */
  var $ = function(id){ return document.getElementById(id); };
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function catName(id){ var c=CATS.find(function(x){return x.id===id;}); return c?c.name:"其他"; }
  function monthBadge(ts){ if(!ts) return ""; var d=new Date(ts); return (d.getMonth()+1)+"月更新"; }

  function toast(msg){
    var t=$("toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove("show"); },1500);
  }

  /* ---------------- clipboard (with file:// fallback) ---------------- */
  function copy(text){
    function done(){ toast("已複製 ✓"); }
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else { fallback(); }
    function fallback(){
      var ta=document.createElement("textarea");
      ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand("copy"); done(); }catch(e){ toast("複製失敗，請手動長按複製"); }
      document.body.removeChild(ta);
    }
  }

  /* ---------------- crypto ---------------- */
  function buf2b64(buf){ var b=new Uint8Array(buf),s=""; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
  function b642buf(b64){ var s=atob(b64),a=new Uint8Array(s.length); for(var i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a; }

  function deriveKey(pw, salt){
    return subtle.importKey("raw", new TextEncoder().encode(pw), {name:"PBKDF2"}, false, ["deriveKey"])
      .then(function(base){
        return subtle.deriveKey(
          {name:"PBKDF2", salt:salt, iterations:150000, hash:"SHA-256"},
          base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
      });
  }
  function encryptStore(key){
    var salt=window.crypto.getRandomValues(new Uint8Array(16));
    var iv=window.crypto.getRandomValues(new Uint8Array(12));
    var data=new TextEncoder().encode(JSON.stringify(entries));
    // re-derive with this store's salt so salt is stored alongside
    return deriveKey(window._pf_pw, salt).then(function(k){
      cryptoKey=k;
      return subtle.encrypt({name:"AES-GCM",iv:iv}, k, data).then(function(ct){
        return {salt:buf2b64(salt), iv:buf2b64(iv), ct:buf2b64(ct)};
      });
    });
  }

  /* ---------------- persistence ---------------- */
  function save(){
    var mode=localStorage.getItem(K_MODE)||"plain";
    if(mode==="enc" && subtle && window._pf_pw){
      encryptStore().then(function(payload){
        localStorage.setItem(K_DATA, JSON.stringify(payload));
      }).catch(function(){ toast("加密儲存失敗"); });
    } else {
      try{ localStorage.setItem(K_DATA, JSON.stringify(entries)); }
      catch(e){ toast("儲存失敗（瀏覽器空間）"); }
    }
  }

  function loadPlain(){
    try{ entries = JSON.parse(localStorage.getItem(K_DATA)||"[]"); }
    catch(e){ entries=[]; }
    if(!Array.isArray(entries)) entries=[];
  }

  /* ---------------- render ---------------- */
  function renderChips(){
    var box=$("chips");
    var counts={all:entries.length};
    CATS.forEach(function(c){ counts[c.id]=entries.filter(function(e){return e.cat===c.id;}).length; });
    var list=[{id:"all",name:"全部"}].concat(CATS);
    box.innerHTML="";
    list.forEach(function(c){
      if(c.id!=="all" && counts[c.id]===0) return; // hide empty categories
      var b=document.createElement("button");
      b.className="chip"+(activeCat===c.id?" active":"");
      b.innerHTML=esc(c.name)+'<span class="ct">'+counts[c.id]+"</span>";
      b.onclick=function(){ activeCat=c.id; renderChips(); renderVault(); };
      box.appendChild(b);
    });
  }

  function renderVault(){
    var box=$("vault"); box.innerHTML="";
    var list=entries.filter(function(e){
      if(activeCat!=="all" && e.cat!==activeCat) return false;
      if(search){
        var q=search.toLowerCase();
        return (e.name||"").toLowerCase().indexOf(q)>=0 ||
               (e.account||"").toLowerCase().indexOf(q)>=0 ||
               (e.note||"").toLowerCase().indexOf(q)>=0;
      }
      return true;
    }).sort(function(a,b){ return (b.updated||0)-(a.updated||0); });

    if(list.length===0){
      box.innerHTML='<div class="empty"><div class="em"><svg width="58" height="58" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M32 58 V30" stroke="#9DBE97" stroke-width="3" stroke-linecap="round"/><path d="M32 34 C20 34 12 26 12 14 C26 14 33 22 32 34 Z" fill="#C7DEC1" stroke="#9DBE97" stroke-width="2.5" stroke-linejoin="round"/><path d="M32 40 C44 40 52 32 52 20 C38 20 31 28 32 40 Z" fill="#B6D2AF" stroke="#9DBE97" stroke-width="2.5" stroke-linejoin="round"/></svg></div>'+
        (entries.length===0
          ? '<p>還沒有任何帳號</p><p class="hint">點右下角的 ＋ 新增第一筆吧</p>'
          : '<p>找不到符合的帳號</p><p class="hint">換個關鍵字或分類試試</p>')+
        "</div>";
      return;
    }

    list.forEach(function(e){
      var card=document.createElement("div");
      card.className="card";
      var badge = monthBadge(e.updated);
      var hasUrl = e.url && /^https?:\/\//i.test(e.url);
      card.innerHTML =
        '<div class="card-head">'+
          '<div class="card-title-zone">'+
            '<div class="title-row">'+
              '<span class="card-title">'+esc(e.name||"（未命名）")+'</span>'+
              (badge?'<span class="badge">'+badge+'</span>':'')+
            '</div>'+
            '<div class="card-sub">'+esc(catName(e.cat))+(e.note?'｜'+esc(e.note):'')+'</div>'+
          '</div>'+
          '<button class="open-btn'+(hasUrl?'':' hidden')+'" data-open="1" aria-label="開啟網站">'+
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>'+
          '</button>'+
        '</div>'+
        '<div class="fields">'+
          (e.userid?
          '<div class="field">'+
            '<span class="field-label">用戶代號</span>'+
            '<span class="field-val">'+esc(e.userid)+'</span>'+
            '<button class="mini-btn" data-cp="userid" aria-label="複製用戶代號">'+copyIcon()+'</button>'+
          '</div>' : '')+
          '<div class="field">'+
            '<span class="field-label">帳號</span>'+
            '<span class="field-val">'+esc(e.account||"—")+'</span>'+
            (e.account?'<button class="mini-btn" data-cp="account" aria-label="複製帳號">'+copyIcon()+'</button>':'')+
          '</div>'+
          '<div class="field">'+
            '<span class="field-label">密碼</span>'+
            '<span class="field-val dots" data-pw>'+dots(e.pass)+'</span>'+
            '<button class="mini-btn" data-eye aria-label="顯示密碼">'+eyeIcon()+'</button>'+
            '<button class="mini-btn" data-cp="pass" aria-label="複製密碼">'+copyIcon()+'</button>'+
          '</div>'+
        '</div>'+
        '<div class="card-foot">'+
          '<button class="foot-btn" data-edit>編輯</button>'+
          '<button class="foot-btn del" data-del>刪除</button>'+
        '</div>';

      // events
      var pwEl=card.querySelector("[data-pw]"); var shown=false;
      card.querySelector("[data-eye]").onclick=function(){
        shown=!shown; pwEl.textContent= shown? (e.pass||"") : dots(e.pass);
        pwEl.classList.toggle("dots", !shown);
      };
      card.querySelectorAll("[data-cp]").forEach(function(btn){
        btn.onclick=function(){
          var k=btn.getAttribute("data-cp");
          copy(k==="pass"? (e.pass||"") : k==="userid"? (e.userid||"") : (e.account||""));
        };
      });
      var ob=card.querySelector("[data-open]");
      if(ob) ob.onclick=function(){ if(hasUrl) window.open(e.url,"_blank","noopener"); };
      card.querySelector("[data-edit]").onclick=function(){ openEdit(e.id); };
      card.querySelector("[data-del]").onclick=function(){ delEntry(e.id); };

      box.appendChild(card);
    });
  }

  function dots(p){ var n=p?p.length:0; if(n<4)n=6; if(n>8)n=8; return new Array(n+1).join("•"); }
  function copyIcon(){ return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2.5"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'; }
  function eyeIcon(){ return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>'; }

  /* ---------------- edit sheet ---------------- */
  function updateBankField(){ $("rowUserid").style.display = (formCat==="bank")?"block":"none"; }
  function renderCatSeg(){
    var seg=$("catSeg"); seg.innerHTML="";
    CATS.forEach(function(c){
      var b=document.createElement("button");
      b.textContent=c.name; b.className=(formCat===c.id?"on":"");
      b.onclick=function(){ formCat=c.id; renderCatSeg(); updateBankField(); };
      seg.appendChild(b);
    });
  }
  function openEdit(id){
    editingId=id;
    var e = id? entries.find(function(x){return x.id===id;}) : null;
    formCat = e? e.cat : (activeCat!=="all"?activeCat:"web");
    $("editTitle").textContent = e? "編輯帳號":"新增帳號";
    $("fName").value=e?e.name:""; $("fAccount").value=e?e.account:"";
    $("fUserid").value=e?(e.userid||""):"";
    $("fPass").value=e?e.pass:""; $("fUrl").value=e?(e.url||""):""; $("fNote").value=e?(e.note||""):"";
    renderCatSeg(); updateBankField();
    $("editScrim").classList.add("show");
  }
  function closeEdit(){ $("editScrim").classList.remove("show"); editingId=null; }
  function saveEdit(){
    var name=$("fName").value.trim();
    if(!name){ toast("請至少填名稱"); $("fName").focus(); return; }
    var obj={
      name:name, account:$("fAccount").value.trim(), pass:$("fPass").value,
      userid:(formCat==="bank")? $("fUserid").value.trim() : "",
      url:$("fUrl").value.trim(), note:$("fNote").value.trim(), cat:formCat, updated:Date.now()
    };
    if(editingId){
      var i=entries.findIndex(function(x){return x.id===editingId;});
      if(i>=0){ obj.id=editingId; obj.created=entries[i].created; entries[i]=obj; }
    } else {
      obj.id=uid(); obj.created=Date.now(); entries.push(obj);
    }
    save(); closeEdit(); renderChips(); renderVault(); toast("已儲存 ✓");
  }
  function delEntry(id){
    var e=entries.find(function(x){return x.id===id;});
    if(!confirm("確定要刪除「"+(e?e.name:"")+"」嗎？\n刪掉就找不回來囉。")) return;
    entries=entries.filter(function(x){return x.id!==id;});
    save(); renderChips(); renderVault(); toast("已刪除");
  }

  /* ---------------- password generator ---------------- */
  function genPassword(){
    var sets="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%&*?";
    var len=16, out="", rnd=window.crypto.getRandomValues(new Uint32Array(len));
    for(var i=0;i<len;i++) out+=sets[rnd[i]%sets.length];
    return out;
  }

  /* ---------------- export / import ---------------- */
  function exportData(){
    var blob=new Blob([JSON.stringify({app:"Kagi",v:1,exported:Date.now(),entries:entries},null,2)],{type:"application/json"});
    var a=document.createElement("a");
    var d=new Date(), p=function(n){return (n<10?"0":"")+n;};
    a.href=URL.createObjectURL(blob);
    a.download="passfolio-backup-"+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+".json";
    a.click(); URL.revokeObjectURL(a.href);
    toast("已匯出備份 ✓");
  }
  function importData(file){
    var r=new FileReader();
    r.onload=function(){
      try{
        var obj=JSON.parse(r.result);
        var arr=Array.isArray(obj)?obj:obj.entries;
        if(!Array.isArray(arr)) throw 0;
        if(!confirm("匯入會覆蓋目前全部資料，確定嗎？")) return;
        entries=arr.map(function(e){ e.id=e.id||uid(); return e; });
        save(); renderChips(); renderVault(); $("setScrim").classList.remove("show");
        toast("已匯入 "+entries.length+" 筆");
      }catch(err){ toast("檔案格式不正確"); }
    };
    r.readAsText(file);
  }

  /* ---------------- lock / master password ---------------- */
  function isLocked(){ return (localStorage.getItem(K_MODE)==="enc"); }

  function showUnlock(){
    $("lockHeading").textContent="輸入主密碼";
    $("lockHint").textContent="解鎖你的 Kagimori";
    $("lockInput2").style.display="none";
    $("lockBtn").textContent="解鎖";
    $("lockErr").textContent="";
    $("lockInput").value="";
    $("lockScreen").classList.add("show");
    $("lockBtn").onclick=tryUnlock;
    setTimeout(function(){ $("lockInput").focus(); },200);
  }
  function tryUnlock(){
    var pw=$("lockInput").value;
    if(!pw){ return; }
    var raw=localStorage.getItem(K_DATA);
    try{
      var payload=JSON.parse(raw);
      deriveKey(pw, b642buf(payload.salt)).then(function(k){
        return subtle.decrypt({name:"AES-GCM",iv:b642buf(payload.iv)}, k, b642buf(payload.ct));
      }).then(function(plain){
        entries=JSON.parse(new TextDecoder().decode(plain));
        window._pf_pw=pw; cryptoKey=true;
        $("lockScreen").classList.remove("show");
        boot2();
      }).catch(function(){ $("lockErr").textContent="主密碼不對，再試一次"; });
    }catch(e){ $("lockErr").textContent="資料讀取失敗"; }
  }

  function setupMasterPassword(){
    $("setScrim").classList.remove("show");
    $("lockHeading").textContent="設定主密碼";
    $("lockHint").textContent="之後每次開啟都要用它解鎖（請記牢，忘了無法復原）";
    $("lockInput").value=""; $("lockInput2").value="";
    $("lockInput2").style.display="block";
    $("lockBtn").textContent="設定並加密";
    $("lockErr").textContent="";
    $("lockScreen").classList.add("show");
    setTimeout(function(){ $("lockInput").focus(); },200);
    $("lockBtn").onclick=function(){
      var a=$("lockInput").value, b=$("lockInput2").value;
      if(a.length<4){ $("lockErr").textContent="主密碼至少 4 個字"; return; }
      if(a!==b){ $("lockErr").textContent="兩次輸入不一樣"; return; }
      window._pf_pw=a;
      localStorage.setItem(K_MODE,"enc");
      save();
      $("lockScreen").classList.remove("show");
      refreshLockRow();
      toast("已開啟主密碼鎖");
    };
  }
  function disableMasterPassword(){
    if(!confirm("關閉主密碼鎖後，資料會以未加密方式保存，確定嗎？")) return;
    localStorage.setItem(K_MODE,"plain");
    window._pf_pw=null; cryptoKey=null;
    save();  // saves plain
    refreshLockRow();
    toast("已關閉主密碼鎖");
  }
  function refreshLockRow(){
    if(isLocked()){
      $("lockLabel").textContent="主密碼鎖（已開啟）";
      $("lockDesc").textContent="資料已加密保存。點右側可關閉。";
      $("lockGo").textContent="關閉";
      $("lockGo").onclick=disableMasterPassword;
    } else {
      $("lockLabel").textContent="設定主密碼鎖";
      $("lockDesc").textContent= subtle? "開啟後資料會加密保存，每次開啟都要輸入主密碼才能解鎖。"
                                       : "此環境不支援加密（需用 https 或部署後使用）。";
      $("lockGo").textContent="開啟";
      $("lockGo").onclick= subtle? setupMasterPassword : function(){ toast("請部署到 https 後再開啟"); };
    }
  }

  /* ---------------- wire up ---------------- */
  function bind(){
    $("addBtn").onclick=function(){ openEdit(null); };
    $("editCancel").onclick=closeEdit;
    $("editSave").onclick=saveEdit;
    $("editScrim").onclick=function(ev){ if(ev.target===$("editScrim")) closeEdit(); };

    $("searchInput").oninput=function(e){ search=e.target.value.trim(); renderVault(); };

    $("settingsBtn").onclick=function(){ refreshLockRow(); $("setScrim").classList.add("show"); };
    $("setClose").onclick=function(){ $("setScrim").classList.remove("show"); };
    $("setScrim").onclick=function(ev){ if(ev.target===$("setScrim")) $("setScrim").classList.remove("show"); };
    $("exportRow").onclick=exportData;
    $("importRow").onclick=function(){ $("importFile").click(); };
    $("importFile").onchange=function(e){ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; };

    $("lockInput").addEventListener("keydown",function(e){ if(e.key==="Enter") $("lockBtn").click(); });
    $("lockInput2").addEventListener("keydown",function(e){ if(e.key==="Enter") $("lockBtn").click(); });
  }

  function boot2(){ renderChips(); renderVault(); }

  function init(){
    bind();
    if(isLocked() && subtle){
      // need unlock
      showUnlock();
    } else {
      if(isLocked() && !subtle){ localStorage.setItem(K_MODE,"plain"); } // fallback
      loadPlain();
      boot2();
    }
  }
  init();
})();
</script>
</body>
